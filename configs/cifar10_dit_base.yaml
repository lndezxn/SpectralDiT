data:
  root: datasets
  batch_size: 256
  num_workers: 4
  pin_memory: true

model:
  name: dit_plain_base
  image_size: 32
  patch_size: 1
  in_channels: 3
  num_classes: 10
  class_dropout_prob: 0.1
  pos_embed_type: 2d_sincos

train:
  seed: 42
  output_dir: outputs/cifar10_dit_base
  mixed_precision: bf16
  grad_accum_steps: 1
  max_steps: 400000
  learning_rate: 0.0001
  min_learning_rate: 0.00001
  warmup_steps: 5000
  ema_decay: 0.9999
  weight_decay: 0.0
  beta1: 0.9
  beta2: 0.99
  grad_clip: 1.0
  log_every: 500
  eval_every: 10000
  save_every: 10000
  resume_from: null

sample:
  num_steps: 50
  num_samples: 64
  debug:
    enabled: false
    output_subdir: debug_tokens
    save_dtype: float32

eval:
  batch_size: 256
  sample_batch_size: 256
  fid_num_samples: 10000
